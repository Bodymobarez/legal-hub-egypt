# Auto-deploy: Netlify → Site configuration → Build & deploy → Link repository → branch `main`.
# Each `git push` to main triggers a build here (no GitHub Actions minutes required).
#
# GitHub Actions workflow `.github/workflows/deploy.yml` is a backup if Actions billing is active.

[build]
  command = "corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/egypt-advocates build && pnpm run build:netlify-api"
  publish = "artifacts/egypt-advocates/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.33.2"
  CI = "true"

[functions]
  directory = "netlify/functions"

# Forward all /api/* calls to the serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
