[build]
  publish = "artifacts/egypt-advocates/dist/public"

[functions]
  directory = "netlify/functions"

# Forward all /api/* calls to the serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
