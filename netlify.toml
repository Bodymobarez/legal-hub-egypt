# Netlify-hosted builds (recommended): link this Git repo under Site configuration → Build & deploy.
# The build runs entirely on Netlify — no GitHub Actions runner quota required.

[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/egypt-advocates build && pnpm run build:netlify-api"
  publish = "artifacts/egypt-advocates/dist/public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Forward all /api/* calls to the serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
