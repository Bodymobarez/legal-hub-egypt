# Optional: deploy from GitHub’s runners using the Netlify CLI.
# Builds on pushes are expected to come from Netlify’s own “linked repository” builds
# (see root `netlify.toml`) — that path does not consume GitHub Actions minutes.
#
# Re-add automatic deploy on push once Actions runners work for this repo:
# on:
#   push:
#     branches: [main]
#   workflow_dispatch:
name: Deploy to Netlify (CLI — manual)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: netlify-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @workspace/egypt-advocates build
        env:
          BASE_PATH: "/"

      - name: Bundle API function
        run: pnpm run build:netlify-api

      - name: Deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NETLIFY_AUTH_TOKEN:-}" ]]; then
            echo "::error title=Missing secret::Repository secret NETLIFY_AUTH_TOKEN is not set. Either add it (Netlify User settings → Applications → Personal access tokens) or rely on Site → Linked repository builds instead (no token needed here)."
            exit 1
          fi
          npx --yes netlify-cli@26.0.1 deploy --prod \
            --dir artifacts/egypt-advocates/dist/public \
            --functions netlify/functions \
            --site 9a900a5a-4eff-4d03-9977-c830b9139997
