# Deploy to Netlify on every push to main (and manual re-run).
# Requires repository secrets: NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID
#
# If Netlify “Build on push” is also enabled for this repo in the Netlify UI,
# disable one path to avoid duplicate production deploys.

name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: netlify-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install
        run: pnpm install --no-frozen-lockfile
        env:
          CI: true

      - name: Build frontend
        run: pnpm --filter @workspace/egypt-advocates build
        env:
          BASE_PATH: "/"

      - name: Bundle API function
        run: pnpm run build:netlify-api

      - name: Deploy to production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${NETLIFY_AUTH_TOKEN:-}" ]]; then
            echo "::error title=Missing secret::Add NETLIFY_AUTH_TOKEN in GitHub → Settings → Secrets."
            exit 1
          fi
          if [[ -z "${NETLIFY_SITE_ID:-}" ]]; then
            echo "::error title=Missing secret::Add NETLIFY_SITE_ID in GitHub → Settings → Secrets."
            exit 1
          fi
          npx --yes netlify-cli@26.0.1 deploy --prod \
            --dir artifacts/egypt-advocates/dist/public \
            --functions netlify/functions \
            --site "${NETLIFY_SITE_ID}"
