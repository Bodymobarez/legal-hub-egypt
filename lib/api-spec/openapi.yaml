      type: object
      required: [slug, nameAr, nameEn, descriptionAr, descriptionEn, durationMinutes, priceEgp, deliveryMode]
      properties:
        slug: { type: string }
        nameAr: { type: string }
        nameEn: { type: string }
        descriptionAr: { type: string }
        descriptionEn: { type: string }
        durationMinutes: { type: integer }
        priceEgp: { type: number }
        deliveryMode: { type: string, enum: [online, in_office, both] }
        practiceAreaId: { type: ["integer", "null"] }
