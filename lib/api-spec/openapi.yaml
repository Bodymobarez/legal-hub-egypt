openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Egypt Advocates law firm API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: site
    description: Public site content
  - name: practice-areas
    description: Practice areas
  - name: lawyers
    description: Lawyers / team
  - name: services
    description: Consultation services
  - name: appointments
    description: Booking appointments
  - name: legal-library
    description: Egyptian laws library
  - name: blog
    description: Blog posts
  - name: contact
    description: Contact inquiries
  - name: chat
    description: Live chat
  - name: testimonials
    description: Testimonials
  - name: faqs
    description: FAQs
  - name: stats
    description: Public statistics
  - name: admin-auth
    description: Admin authentication
  - name: admin-dashboard
    description: Admin dashboard
  - name: admin-clients
    description: CRM - clients
  - name: admin-cases
    description: CRM - cases
  - name: admin-appointments
    description: Manage appointments
  - name: admin-invoices
    description: ERP - invoices
  - name: admin-payments
    description: ERP - payments
  - name: admin-chat
    description: Admin chat management
  - name: admin-content
    description: Admin content management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ---------------- Public site ----------------
  /site/info:
    get:
      operationId: getSiteInfo
      tags: [site]
      summary: Site identity, contact, hero, social
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SiteInfo" }

  /site/work-hours-status:
    get:
      operationId: getWorkHoursStatus
      tags: [site]
      summary: Whether the office is currently open and next opening time
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkHoursStatus" }

  /stats/site:
    get:
      operationId: getSiteStats
      tags: [stats]
      summary: Public stats (cases handled, clients, years, satisfaction)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SiteStats" }

  /practice-areas:
    get:
      operationId: listPracticeAreas
      tags: [practice-areas]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PracticeArea" }
  /practice-areas/{slug}:
    get:
      operationId: getPracticeArea
      tags: [practice-areas]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PracticeArea" }
        "404": { $ref: "#/components/responses/NotFound" }

  /lawyers:
    get:
      operationId: listLawyers
      tags: [lawyers]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Lawyer" }
  /lawyers/{id}:
    get:
      operationId: getLawyer
      tags: [lawyers]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Lawyer" }
        "404": { $ref: "#/components/responses/NotFound" }

  /services:
    get:
      operationId: listServices
      tags: [services]
      parameters:
        - in: query
          name: practiceAreaId
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Service" }
  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Service" }
        "404": { $ref: "#/components/responses/NotFound" }

  /appointments/availability:
    get:
      operationId: getAvailability
      tags: [appointments]
      parameters:
        - in: query
          name: date
          required: true
          schema: { type: string, format: date }
        - in: query
          name: serviceId
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvailabilityResponse" }
  /appointments:
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book a new appointment (guest, no auth)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAppointmentInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Appointment" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Testimonial" }

  /faqs:
    get:
      operationId: listFaqs
      tags: [faqs]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Faq" }

  /legal-categories:
    get:
      operationId: listLegalCategories
      tags: [legal-library]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LegalCategory" }
  /legal-articles:
    get:
      operationId: listLegalArticles
      tags: [legal-library]
      parameters:
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: categoryId
          required: false
          schema: { type: integer }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LegalArticleList" }
  /legal-articles/{slug}:
    get:
      operationId: getLegalArticle
      tags: [legal-library]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LegalArticle" }
        "404": { $ref: "#/components/responses/NotFound" }

  /blog-posts:
    get:
      operationId: listBlogPosts
      tags: [blog]
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 12 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BlogPost" }
  /blog-posts/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlogPost" }
        "404": { $ref: "#/components/responses/NotFound" }

  /contact:
    post:
      operationId: submitContactInquiry
      tags: [contact]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateContactInquiryInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContactInquiry" }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ---------------- Chat ----------------
  /chat/threads:
    post:
      operationId: createChatThread
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateChatThreadInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatThread" }
  /chat/threads/{id}:
    get:
      operationId: getChatThread
      tags: [chat]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatThreadWithMessages" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/threads/{id}/messages:
    post:
      operationId: postChatMessage
      tags: [chat]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostChatMessageInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatPostResult" }

  # ---------------- Admin Auth ----------------
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin-auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminLoginInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin-auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }
  /admin/me:
    get:
      operationId: adminMe
      tags: [admin-auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ---------------- Admin Dashboard ----------------
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin-dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminDashboard" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /admin/recent-activity:
    get:
      operationId: getAdminRecentActivity
      tags: [admin-dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ---------------- Admin Clients (CRM) ----------------
  /admin/clients:
    get:
      operationId: listAdminClients
      tags: [admin-clients]
      parameters:
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: status
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Client" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createAdminClient
      tags: [admin-clients]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateClientInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client" }
  /admin/clients/{id}:
    get:
      operationId: getAdminClient
      tags: [admin-clients]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClientWithCases" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateAdminClient
      tags: [admin-clients]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateClientInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Client" }
    delete:
      operationId: deleteAdminClient
      tags: [admin-clients]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  # ---------------- Admin Cases (CRM) ----------------
  /admin/cases:
    get:
      operationId: listAdminCases
      tags: [admin-cases]
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string }
        - in: query
          name: clientId
          required: false
          schema: { type: integer }
        - in: query
          name: lawyerId
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CaseSummary" }
    post:
      operationId: createAdminCase
      tags: [admin-cases]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCaseInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Case" }
  /admin/cases/{id}:
    get:
      operationId: getAdminCase
      tags: [admin-cases]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CaseDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateAdminCase
      tags: [admin-cases]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCaseInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Case" }
    delete:
      operationId: deleteAdminCase
      tags: [admin-cases]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }
  /admin/cases/{id}/events:
    post:
      operationId: addCaseEvent
      tags: [admin-cases]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCaseEventInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CaseEvent" }

  # ---------------- Admin Appointments ----------------
  /admin/appointments:
    get:
      operationId: listAdminAppointments
      tags: [admin-appointments]
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string }
        - in: query
          name: from
          required: false
          schema: { type: string, format: date }
        - in: query
          name: to
          required: false
          schema: { type: string, format: date }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Appointment" }
  /admin/appointments/{id}:
    get:
      operationId: getAdminAppointment
      tags: [admin-appointments]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Appointment" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateAdminAppointment
      tags: [admin-appointments]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAppointmentInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Appointment" }
  /admin/appointments/{id}/approve:
    post:
      operationId: approveAppointment
      tags: [admin-appointments]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApproveAppointmentInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Appointment" }
  /admin/appointments/{id}/reject:
    post:
      operationId: rejectAppointment
      tags: [admin-appointments]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RejectAppointmentInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Appointment" }
  /admin/appointments/{id}/complete:
    post:
      operationId: completeAppointment
      tags: [admin-appointments]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Appointment" }

  # ---------------- Admin Invoices (ERP) ----------------
  /admin/invoices:
    get:
      operationId: listAdminInvoices
      tags: [admin-invoices]
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string }
        - in: query
          name: clientId
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Invoice" }
    post:
      operationId: createAdminInvoice
      tags: [admin-invoices]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInvoiceInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }
  /admin/invoices/{id}:
    get:
      operationId: getAdminInvoice
      tags: [admin-invoices]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateAdminInvoice
      tags: [admin-invoices]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateInvoiceInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }
  /admin/invoices/{id}/mark-paid:
    post:
      operationId: markInvoicePaid
      tags: [admin-invoices]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MarkInvoicePaidInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }

  # ---------------- Admin Payments ----------------
  /admin/payments:
    get:
      operationId: listAdminPayments
      tags: [admin-payments]
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Payment" }
  /admin/payments/{id}/confirm:
    post:
      operationId: confirmPayment
      tags: [admin-payments]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Payment" }

  # ---------------- Admin Chat ----------------
  /admin/chat/threads:
    get:
      operationId: listAdminChatThreads
      tags: [admin-chat]
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChatThread" }
  /admin/chat/threads/{id}:
    get:
      operationId: getAdminChatThread
      tags: [admin-chat]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatThreadWithMessages" }
  /admin/chat/threads/{id}/reply:
    post:
      operationId: adminReplyChat
      tags: [admin-chat]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminChatReplyInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatMessage" }
  /admin/chat/threads/{id}/close:
    post:
      operationId: closeChatThread
      tags: [admin-chat]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatThread" }

  # ---------------- Admin Contact Inquiries ----------------
  /admin/contact-inquiries:
    get:
      operationId: listAdminContactInquiries
      tags: [admin-content]
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
