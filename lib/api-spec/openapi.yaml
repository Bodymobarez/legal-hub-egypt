components:
  responses:
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
    MessageResponse:
      type: object
      required: [message]
      properties:
        message: { type: string }

    SiteInfo:
      type: object
      required: [nameAr, nameEn, taglineAr, taglineEn, addressAr, addressEn, phone, whatsapp, email, workHours, social, established]
      properties:
        nameAr: { type: string }
        nameEn: { type: string }
        taglineAr: { type: string }
        taglineEn: { type: string }
        addressAr: { type: string }
        addressEn: { type: string }
        phone: { type: string }
        whatsapp: { type: string }
        email: { type: string }
        established: { type: integer }
        workHours:
          type: array
          items:
            type: object
            required: [dayOfWeek, openTime, closeTime]
            properties:
              dayOfWeek: { type: integer, description: "0=Sunday ... 6=Saturday" }
              openTime: { type: string, description: "HH:MM 24h" }
              closeTime: { type: string, description: "HH:MM 24h" }
              isClosed: { type: boolean }
        social:
          type: object
          properties:
            facebook: { type: ["string", "null"] }
            instagram: { type: ["string", "null"] }
            twitter: { type: ["string", "null"] }
            linkedin: { type: ["string", "null"] }
            youtube: { type: ["string", "null"] }

    WorkHoursStatus:
      type: object
      required: [isOpen, timezone, currentTime]
      properties:
        isOpen: { type: boolean }
        timezone: { type: string }
        currentTime: { type: string, format: date-time }
        nextOpenAt: { type: ["string", "null"], format: date-time }
        message: { type: string }

    SiteStats:
      type: object
      required: [casesHandled, satisfiedClients, yearsOfExperience, successRate, lawyersCount, practiceAreasCount]
      properties:
        casesHandled: { type: integer }
        satisfiedClients: { type: integer }
        yearsOfExperience: { type: integer }
        successRate: { type: integer, description: "Percentage 0-100" }
        lawyersCount: { type: integer }
        practiceAreasCount: { type: integer }

    PracticeArea:
      type: object
      required: [id, slug, nameAr, nameEn, descriptionAr, descriptionEn, icon, sortOrder, isActive]
      properties:
        id: { type: integer }
        slug: { type: string }
        nameAr: { type: string }
        nameEn: { type: string }
        descriptionAr: { type: string }
        descriptionEn: { type: string }
        icon: { type: string }
        sortOrder: { type: integer }
        isActive: { type: boolean }

    Lawyer:
      type: object
      required: [id, slug, nameAr, nameEn, titleAr, titleEn, bioAr, bioEn, photoUrl, email, phone, specializations, yearsExperience, sortOrder, isActive]
      properties:
        id: { type: integer }
        slug: { type: string }
        nameAr: { type: string }
        nameEn: { type: string }
        titleAr: { type: string }
        titleEn: { type: string }
        bioAr: { type: string }
        bioEn: { type: string }
        photoUrl: { type: ["string", "null"] }
        email: { type: string }
        phone: { type: string }
        specializations:
          type: array
          items: { type: string }
        yearsExperience: { type: integer }
        sortOrder: { type: integer }
        isActive: { type: boolean }
    CreateLawyerInput:
      type: object
      required: [slug, nameAr, nameEn, titleAr, titleEn, bioAr, bioEn, email, phone, specializations, yearsExperience]
      properties:
        slug: { type: string }
        nameAr: { type: string }
        nameEn: { type: string }
        titleAr: { type: string }
        titleEn: { type: string }
        bioAr: { type: string }
        bioEn: { type: string }
        photoUrl: { type: ["string", "null"] }
        email: { type: string }
        phone: { type: string }
        specializations:
          type: array
          items: { type: string }
        yearsExperience: { type: integer }
        sortOrder: { type: integer }
        isActive: { type: boolean }
    UpdateLawyerInput:
      type: object
      properties:
        nameAr: { type: string }
        nameEn: { type: string }
        titleAr: { type: string }
        titleEn: { type: string }
        bioAr: { type: string }
        bioEn: { type: string }
        photoUrl: { type: ["string", "null"] }
        email: { type: string }
        phone: { type: string }
        specializations:
          type: array
